<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Moj referral · Edit Unovac — Uživo Trening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0403;
    --card: #181009;
    --card-border: #2b2014;
    --line: #2b2014;
    --muted: #8c8273;
    --text-primary: #f5efe4;
    --text-dim: #a99e8d;
    --gold: #e8a838;
    --gold-hover: #d4982f;
    --gold-dark: #6b4e1c;

    --radius-sm: 0.25rem;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --card-padding: 2rem;
    --card-gap: 1.25rem;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Montserrat', Arial, sans-serif;
    font-weight: 500;
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }

  .hero { margin-bottom: 32px; }
  .hero h1 {
    font-weight: 800;
    font-size: 42px;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text-primary);
  }
  .hero p {
    margin-top: 12px;
    color: var(--text-dim);
    font-size: 16px;
    line-height: 1.55;
    font-weight: 500;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: var(--card-padding);
    margin-bottom: var(--card-gap);
  }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .progress-num {
    font-weight: 800;
    font-size: 84px;
    line-height: 0.9;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .progress-rank {
    text-align: right;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.4;
  }
  .progress-rank .rank-big {
    display: block;
    color: var(--gold);
    font-weight: 800;
    font-size: 40px;
    line-height: 0.9;
    margin-bottom: 4px;
  }
  .progress-caption {
    margin-top: 10px;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 500;
  }

  /* Share */
  .share-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .share-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--card-border);
    color: var(--text-primary);
    font-family: 'Montserrat', Menlo, monospace;
    font-weight: 500;
    font-size: 14px;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    outline: none;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .share-input:focus { border-color: var(--muted); }
  .copy-btn {
    background: var(--gold);
    color: #1a1000;
    border: 1px solid transparent;
    padding: 14px 26px;
    border-radius: var(--radius-sm);
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1em;
    cursor: pointer;
    transition: background-color 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .copy-btn:hover { background: var(--gold-hover); }
  .copy-btn:active { transform: scale(0.97); }
  .copy-btn.copied { background: var(--gold-dark); color: var(--text-primary); }

  /* Referrals list */
  .ref-list { list-style: none; }
  .ref-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--line);
    gap: 12px;
  }
  .ref-item:first-child { padding-top: 4px; }
  .ref-item:last-child { border-bottom: none; padding-bottom: 0; }
  .ref-item-main { min-width: 0; flex: 1; }
  .ref-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ref-email {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }
  .ref-time {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .empty {
    text-align: center;
    padding: 20px 0 8px;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
  }

  /* Leaderboard */
  .lb-list { list-style: none; }
  .lb-item {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
    gap: 14px;
  }
  .lb-item:first-child { padding-top: 4px; }
  .lb-item:last-child { border-bottom: none; padding-bottom: 0; }
  .lb-item.me {
    background: rgba(232, 168, 56, 0.08);
    border-radius: var(--radius-sm);
    border-bottom: 1px solid transparent;
    padding: 14px 12px;
    margin: 0 -12px;
  }

  .lb-rank {
    font-weight: 800;
    font-size: 22px;
    line-height: 1;
    color: var(--muted);
    text-align: left;
  }
  .lb-item.me .lb-rank,
  .lb-item.top-3 .lb-rank { color: var(--gold); }

  .lb-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lb-email {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lb-count {
    font-weight: 800;
    font-size: 20px;
    color: var(--text-primary);
  }
  .lb-count-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-left: 6px;
  }
  .lb-foot {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 13px;
  }
  .lb-foot .highlight {
    color: var(--gold);
    font-weight: 700;
  }

  /* States */
  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-size: 18px;
  }
  .error-box {
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-primary);
    padding: 20px;
    border-radius: var(--radius-lg);
    font-size: 15px;
    line-height: 1.55;
    font-weight: 500;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text-primary);
    color: var(--bg);
    padding: 13px 22px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .hero h1 { font-size: 32px; }
    .progress-num { font-size: 64px; }
    .progress-rank .rank-big { font-size: 32px; }
    .copy-btn { padding: 14px 18px; }
    .lb-item { grid-template-columns: 36px 1fr auto; gap: 10px; }
    .lb-rank { font-size: 18px; }
    .lb-count { font-size: 17px; }
  }
</style>
</head>
<body>

<main id="app">
  <div class="loading" id="loading">Učitavanje…</div>
</main>

<div class="toast" id="toast">Link kopiran ✓</div>

<script>
  const SUPABASE_URL = 'https://qdllfhjlibyvwntwknkg.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_qr-AMxcW5uMNtOJSYiMPtw_-xxd1XSr';
  const WEBINAR_LANDING_URL = 'https://uzivotrening.editunovac.com/optin-970758';
  // PLACEHOLDER — prag i tekst nagrade, menja se kad Tibor odluči:
  const REWARD_TEXT = 'Pozovi prijatelje preko svog linka i osvoji nagradu.';

  const params = new URLSearchParams(location.search);
  const token = params.get('t');
  const app = document.getElementById('app');
  const isDemoMode = params.get('demo') === '1';

  if (isDemoMode) {
    render(demoData(), demoLeaderboard());
  } else if (!token) {
    renderError('Link nije ispravan. Iskoristi link koji si dobio posle prijave.');
  } else {
    loadAll(token);
  }

  function demoData() {
    const now = Date.now();
    return {
      ref_code: 'X7K2M9',
      first_name: 'Marko',
      last_name: 'Marković',
      referral_count: 3,
      my_rank: 4,
      total_with_referrals: 18,
      referrals: [
        { email: 'ana.petrovic@gmail.com', first_name: 'Ana', last_name: 'Petrović', created_at: new Date(now - 45*60*1000).toISOString() },
        { email: 'stefan@outlook.com', first_name: 'Stefan', last_name: 'Jovanović', created_at: new Date(now - 3*3600*1000).toISOString() },
        { email: 'milica.jovanovic@yahoo.com', first_name: 'Milica', last_name: 'Ilić', created_at: new Date(now - 26*3600*1000).toISOString() },
      ],
    };
  }
  function demoLeaderboard() {
    return [
      { rank: 1, first_name: 'Jovana', last_name: 'Stanković', email: 'j***@example.com', referral_count: 12, is_me: false },
      { rank: 2, first_name: 'Nikola', last_name: 'Petrović', email: 'n***@example.com', referral_count: 9, is_me: false },
      { rank: 3, first_name: 'Ivana', last_name: 'Đorđević', email: 'i***@example.com', referral_count: 7, is_me: false },
      { rank: 4, first_name: 'Marko', last_name: 'Marković', email: 'marko@example.com', referral_count: 3, is_me: true },
      { rank: 5, first_name: 'Petar', last_name: 'Nikolić', email: 'p***@example.com', referral_count: 2, is_me: false },
    ];
  }

  async function loadAll(t) {
    try {
      const [me, board] = await Promise.all([
        rpc('get_dashboard', { p_token: t }),
        rpc('get_leaderboard', { p_token: t }),
      ]);
      const meRow = Array.isArray(me) ? me[0] : me;
      if (!meRow) {
        renderError('Nismo pronašli tvoj dashboard. Proveri link.');
        return;
      }
      render(meRow, Array.isArray(board) ? board : []);
    } catch (err) {
      console.error(err);
      renderError('Trenutno ne možemo da učitamo podatke. Probaj ponovo za minut.');
    }
  }

  async function rpc(fn, body) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`${fn} ${res.status}`);
    return res.json();
  }

  function render(data, board) {
    const count = Number(data.referral_count || 0);
    const firstName = data.first_name || '';
    const refCode = data.ref_code;
    const shareUrl = `${WEBINAR_LANDING_URL}?r=${refCode}`;
    const referrals = Array.isArray(data.referrals) ? data.referrals : [];
    const myRank = data.my_rank;

    const greeting = firstName ? `Pozdrav, ${escapeHtml(firstName)}!` : 'Pozdrav!';
    const subtitle = count === 0
      ? REWARD_TEXT
      : `Već si pozvao/la ${count} ${plural(count)}. Nastavi — svaka nova prijava se računa.`;

    const rankBlock = myRank
      ? `<div class="progress-rank">
           <span class="rank-big">#${myRank}</span>
         </div>`
      : '';

    const leaderboardBlock = renderLeaderboard(board, refCode, myRank, count);

    app.innerHTML = `
      <div class="hero">
        <h1>${greeting}</h1>
        <p>${subtitle}</p>
      </div>

      <div class="card">
        <div class="card-label">Tvoji referali</div>
        <div class="progress-row">
          <div class="progress-num">
            <span class="count">${count}</span>
          </div>
          ${rankBlock}
        </div>
        <div class="progress-caption">prijavljenih preko tvog linka</div>
      </div>

      <div class="card">
        <div class="card-label">Tvoj referral link</div>
        <div class="share-row">
          <input class="share-input" id="shareInput" value="${escapeHtml(shareUrl)}" readonly />
          <button class="copy-btn" id="copyBtn">Kopiraj</button>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Ljudi koje si doveo (${count})</div>
        ${referrals.length === 0
          ? `<div class="empty">Još niko. Podeli link iznad — potreban ti je samo klik na "Kopiraj".</div>`
          : `<ul class="ref-list">${referrals.map(renderRefItem).join('')}</ul>`}
      </div>

      ${leaderboardBlock}
    `;

    document.getElementById('copyBtn').addEventListener('click', onCopy);
    document.getElementById('shareInput').addEventListener('click', (e) => e.target.select());
  }

  function renderLeaderboard(board, myRefCode, myRank, myCount) {
    if (!board || board.length === 0) return '';

    const rows = board.map((r) => {
      const isMe = r.is_me === true;
      const top3 = r.rank <= 3;
      const name = [r.first_name, r.last_name].filter(Boolean).join(' ') || '—';
      return `
        <li class="lb-item ${isMe ? 'me' : ''} ${top3 ? 'top-3' : ''}">
          <div class="lb-rank">${r.rank}</div>
          <div>
            <div class="lb-name">${escapeHtml(name)}</div>
            <div class="lb-email">${escapeHtml(r.email || '')}</div>
          </div>
          <div>
            <span class="lb-count">${r.referral_count}</span><span class="lb-count-label">${plural(Number(r.referral_count))}</span>
          </div>
        </li>
      `;
    }).join('');

    const showMyPosition = myRank != null && myRank > board.length;
    const foot = showMyPosition
      ? `<div class="lb-foot">Ti si <span class="highlight">#${myRank}</span> sa ${myCount} ${plural(myCount)}. Vrati se na vrh — nije kasno.</div>`
      : '';

    return `
      <div class="card">
        <div class="card-label">Lestvica · Top ${board.length}</div>
        <ul class="lb-list">${rows}</ul>
        ${foot}
      </div>
    `;
  }

  function renderRefItem(r) {
    const full = [r.first_name, r.last_name].filter(Boolean).join(' ') || '—';
    return `
      <li class="ref-item">
        <div class="ref-item-main">
          <div class="ref-name">${escapeHtml(full)}</div>
          <div class="ref-email">${escapeHtml(r.email || '')}</div>
        </div>
        <div class="ref-time">${formatTime(r.created_at)}</div>
      </li>
    `;
  }

  async function onCopy() {
    const btn = document.getElementById('copyBtn');
    const input = document.getElementById('shareInput');
    try {
      await navigator.clipboard.writeText(input.value);
    } catch {
      input.select();
      document.execCommand('copy');
    }
    btn.textContent = 'Kopirano ✓';
    btn.classList.add('copied');
    showToast();
    setTimeout(() => {
      btn.textContent = 'Kopiraj';
      btn.classList.remove('copied');
    }, 2000);
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function renderError(msg) {
    app.innerHTML = `
      <div class="error-box">${escapeHtml(msg)}</div>
    `;
  }

  function plural(n) {
    const mod10 = n % 10;
    const mod100 = n % 100;
    if (mod10 === 1 && mod100 !== 11) return 'prijavu';
    if ([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return 'prijave';
    return 'prijava';
  }

  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return 'upravo sad';
    if (diff < 3600) return `pre ${Math.floor(diff / 60)} min`;
    if (diff < 86400) return `pre ${Math.floor(diff / 3600)} h`;
    const days = Math.floor(diff / 86400);
    if (days < 7) return `pre ${days} ${days === 1 ? 'dan' : 'dana'}`;
    return d.toLocaleDateString('sr-Latn-RS', { day: 'numeric', month: 'short' });
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }
</script>

</body>
</html>
