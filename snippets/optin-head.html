<!--
  Edit Unovac Â· UĹľivo Trening â€” OPTIN page â€” Referral Capture + Signup Tracking
  (https://uzivotrening.editunovac.com/optin-970758)

  INSTALL: GHL funnel â†’ Settings â†’ Tracking & scripts â†’ Head tracking code.
  Save + Publish. (Funnel-wide â€” bezbedno na svim stranicama.)

  Ĺ ta radi:
  1. ÄŚita ?r=KOD iz URL-a (referral kod) i ÄŤuva ga u localStorage (preĹľivljava ceo funnel).
  2. Na submit optin forme: validira ime/email i ODMAH Ĺˇalje prijavu u referral
     sistem (/api/signup) â€” referral se beleĹľi na optinu, ne na thank-you stranici.
     API je idempotentan: isti email uvek dobija isti ref kod, nema duplikata.
  3. Stash ime/email u localStorage â€” thank-you widget ih ÄŤita da prikaĹľe liÄŤni link.
-->
<script>
(function () {
  var REF_STORAGE = 'eu_ref';
  var SIGNUP_STORAGE = 'eu_signup';
  var SENT_STORAGE = 'eu_signup_sent';
  var QUERY_PARAM = 'r';
  var API_URL = 'https://tibor-referral-system.vercel.app/api/signup';
  var WEBINAR_URL = 'https://uzivotrening.editunovac.com/optin-970758';

  // 1. Capture ?r= iz URL-a â†’ localStorage
  try {
    var params = new URLSearchParams(window.location.search);
    var codeFromUrl = params.get(QUERY_PARAM);
    if (codeFromUrl) {
      var clean = codeFromUrl.trim().toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
      if (clean.length >= 4) {
        try { localStorage.setItem(REF_STORAGE, clean); } catch (e) {}
      }
    }
  } catch (e) {}

  function getStoredRef() {
    try { return localStorage.getItem(REF_STORAGE) || ''; } catch (e) { return ''; }
  }

  function isValidEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  }

  // 2. Na submit bilo koje forme: validiraj pa upiĹˇi prijavu u referral sistem.
  //    Capture faza â€” okida se i kad forma koristi sopstveni fetch submit.
  function onSubmit(e) {
    var form = e.target || this;
    if (!form || !form.querySelector) return;
    try {
      var emailEl = form.querySelector('input[type="email"], input[name="email"], input[name="Email"]');
      var nameEl = form.querySelector('input[name="name"], input[name="Name"], input[autocomplete="name"]');
      var phoneEl = form.querySelector('input[type="tel"], input[name="phone"]');
      var email = ((emailEl && emailEl.value) || '').trim().toLowerCase();
      var name = ((nameEl && nameEl.value) || '').trim();

      // Ista pravila kao validacija optin forme: ime + validan email,
      // a ako forma ima polje za telefon â€” bar 6 cifara.
      if (!name || !email || !isValidEmail(email)) return;
      if (phoneEl && ((phoneEl.value || '').replace(/\D/g, '').length < 6)) return;

      // 3. Stash za thank-you widget
      try {
        localStorage.setItem(SIGNUP_STORAGE, JSON.stringify({
          email: email,
          name: name,
          ref: getStoredRef(),
          ts: Date.now(),
        }));
      } catch (err) {}

      // Ne Ĺˇalji isti email viĹˇe puta iz istog browsera (API je svakako idempotentan)
      try {
        if (localStorage.getItem(SENT_STORAGE) === email) return;
      } catch (err) {}

      // Upis prijave â€” fire-and-forget, keepalive preĹľivljava redirect
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        keepalive: true,
        body: JSON.stringify({
          email: email,
          name: name,
          ref: getStoredRef(),
          webinarUrl: WEBINAR_URL,
        }),
      }).then(function (res) {
        if (res.ok) {
          try { localStorage.setItem(SENT_STORAGE, email); } catch (err) {}
        }
      }).catch(function () { /* ne ometaj optin flow */ });
    } catch (err) {}
  }

  function attach() {
    var forms = document.querySelectorAll('form');
    for (var i = 0; i < forms.length; i++) {
      forms[i].addEventListener('submit', onSubmit, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', attach);
  } else {
    attach();
  }
})();
</script>
