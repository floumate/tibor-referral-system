<!--
  Edit Unovac · Uživo Trening - OPTIN page - Referral Capture + Signup Tracking
  (https://uzivotrening.editunovac.com/optin)

  INSTALL (bilo gde od ova dva, oba rade):
   A) GHL funnel/page → Settings → Tracking & scripts → Head tracking code, ili
   B) na sam KRAJ optin Custom HTML/Code elementa.
  Save + Publish.

  Šta radi:
  1. Čita ?r=KOD iz URL-a (referral kod) i čuva ga u localStorage (preživljava ceo funnel).
  2. Na submit optin forme: validira ime/email (+ honeypot anti-bot) i ODMAH šalje
     prijavu u referral sistem (/api/signup) - referral se beleži na optinu, ne na
     thank-you. API je idempotentan: isti email uvek dobija isti ref kod, bez duplikata.
  3. Stash ime/email u localStorage - thank-you widget ih čita da prikaže lični link.

  NE dira AEvent/Hyros/redirect - zaseban submit listener (capture faza), keepalive
  fetch preživljava redirect na application stranicu.
-->
<script>
(function () {
  var REF_STORAGE = 'eu_ref';
  var SIGNUP_STORAGE = 'eu_signup';
  var SENT_STORAGE = 'eu_signup_sent';
  var QUERY_PARAM = 'r';
  var API_URL = 'https://uzivo-trening.vercel.app/api/signup';
  var WEBINAR_URL = 'https://uzivotrening.editunovac.com/optin';

  // 1. Capture ?r= iz URL-a → localStorage
  try {
    var params = new URLSearchParams(window.location.search);
    var codeFromUrl = params.get(QUERY_PARAM);
    if (codeFromUrl) {
      var clean = codeFromUrl.trim().toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
      if (clean.length >= 4) {
        try { localStorage.setItem(REF_STORAGE, clean); } catch (e) {}
      }
    }
  } catch (e) {}

  function getStoredRef() {
    try { return localStorage.getItem(REF_STORAGE) || ''; } catch (e) { return ''; }
  }

  function isValidEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  }

  // Telefon u E.164 (kao optin forma): dial code (iz country select) + broj, bez razmaka.
  function buildE164(dialCode, raw) {
    var clean = function (s) { return (s || '').replace(/[\s\-().]/g, ''); };
    var num = (raw || '').trim();
    if (!num) return '';
    if (num.charAt(0) === '+') return clean(num);
    if (num.indexOf('00') === 0) return '+' + clean(num.slice(2));
    return (dialCode || '') + clean(num).replace(/^0+/, '');
  }

  // 2. Na submit BILO KOJE forme (delegacija na document, capture faza - hvata i
  //    forme koje GHL renderuje dinamički): validiraj pa upiši prijavu.
  function onSubmit(e) {
    var form = e.target;
    if (!form || form.tagName !== 'FORM' || !form.querySelector) return;
    try {
      // Honeypot: ako je skriveno polje popunjeno → bot, preskoči (isto kao optin forma).
      var hp = form.querySelector('input[name="website"]');
      if (hp && (hp.value || '').trim() !== '') return;

      var emailEl = form.querySelector('input[type="email"], input[name="email"], input[name="Email"]');
      var nameEl = form.querySelector('input[name="name"], input[name="Name"], input[autocomplete="name"]');
      var phoneEl = form.querySelector('input[type="tel"], input[name="phone"]');
      var dialEl = form.querySelector('#aeCountry, .ae-country-select, select');
      var email = ((emailEl && emailEl.value) || '').trim().toLowerCase();
      var name = ((nameEl && nameEl.value) || '').trim();
      var phone = buildE164(dialEl ? dialEl.value : '', (phoneEl && phoneEl.value) || '');

      // Ista pravila kao validacija optin forme: ime + validan email,
      // a ako forma ima polje za telefon - bar 6 cifara.
      if (!name || !email || !isValidEmail(email)) return;
      if (phoneEl && ((phoneEl.value || '').replace(/\D/g, '').length < 6)) return;

      // 3. Stash za thank-you widget
      try {
        localStorage.setItem(SIGNUP_STORAGE, JSON.stringify({
          email: email,
          name: name,
          ref: getStoredRef(),
          ts: Date.now(),
        }));
      } catch (err) {}

      // Ne šalji isti email više puta iz istog browsera (API je svakako idempotentan)
      try {
        if (localStorage.getItem(SENT_STORAGE) === email) return;
      } catch (err) {}

      // Upis prijave - fire-and-forget, keepalive preživljava redirect
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        keepalive: true,
        body: JSON.stringify({
          email: email,
          name: name,
          phone: phone,
          ref: getStoredRef(),
          webinarUrl: WEBINAR_URL,
        }),
      }).then(function (res) {
        if (res.ok) {
          try { localStorage.setItem(SENT_STORAGE, email); } catch (err) {}
        }
      }).catch(function () { /* ne ometaj optin flow */ });
    } catch (err) {}
  }

  document.addEventListener('submit', onSubmit, true);
})();
</script>
