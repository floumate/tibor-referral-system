<script>
  /* ---------- Referral link: LICNI kod iz referral sistema + kopiranje + link na dashboard ----------
     Cita prijavu (localStorage eu_signup sa optina), zove /api/signup (idempotentno),
     dobije licni ref kod + licni dashboard link. Ubaci share link u dugme "Kopiraj svoj
     link", a dashboard link u "svojoj platformi" gdje korisnik prati sve prijave.
     Fallback na genericki link ako nema prijave (tada se dashboard link sakrije).
     Dizajn kartice ostaje netaknut. */
  var REFERRAL_LINK = "https://uzivotrening.editunovac.com/optin"; // fallback dok ne stigne licni
  var LINK_READY = false;

  (function () {
    var API_URL    = "https://tibor-referral-system.vercel.app/api/signup";
    // r= PRVI + bez uglastih zagrada - da link preživi deljenje (aplikacije sijeku URL na "[").
    var SHARE_PARAMS = "el=referral_evergreen_webinar_url_thankyou&hgoal=evergreen_webinar&htrafficsource=referral&source=referral";
    var SHARE_PREFIX = "https://uzivotrening.editunovac.com/optin?r=";

    var btn    = document.getElementById('tk-copy-btn');
    var label  = btn ? btn.querySelector('.tk-cta-label') : null;
    var helper = document.getElementById('tk-dash-helper');
    var dash   = document.getElementById('tk-dash-link');

    function getParam(keys) {
      var p = new URLSearchParams(window.location.search);
      for (var i = 0; i < keys.length; i++) { var v = p.get(keys[i]); if (v && v.trim()) return v.trim(); }
      return '';
    }
    function getStoredRef() { try { return localStorage.getItem('eu_ref') || ''; } catch (e) { return ''; } }
    function readStash() { try { return JSON.parse(localStorage.getItem('eu_signup') || '{}') || {}; } catch (e) { return {}; } }

    function ready(shareUrl, dashUrl) {
      REFERRAL_LINK = shareUrl;
      LINK_READY = true;
      if (label) label.textContent = 'Kopiraj svoj link';
      if (dash && dashUrl) { dash.href = dashUrl; if (helper) helper.style.display = ''; }
      else if (helper) { helper.style.display = 'none'; }
    }

    var stash = readStash();
    var email = getParam(['email', 'Email']) || stash.email;
    var name  = getParam(['first_name', 'name', 'Name']) || stash.name;
    var ref   = getParam(['r', 'ref', 'Ref']) || stash.ref || getStoredRef();

    if (!email) { ready(REFERRAL_LINK, null); return; } // nema prijave u browseru -> genericki link, dashboard skriven

    if (label) label.textContent = 'Pripremam tvoj link\u2026';

    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, name: name, ref: ref, webinarUrl: "https://uzivotrening.editunovac.com/optin" })
    })
    .then(function (res) { if (!res.ok) throw new Error('status ' + res.status); return res.json(); })
    .then(function (data) { ready(data && data.refCode ? (SHARE_PREFIX + data.refCode + '&' + SHARE_PARAMS) : REFERRAL_LINK, data && data.dashboardUrl); })
    .catch(function (err) { console.error('[eu-ref] signup failed', err); ready(REFERRAL_LINK, null); });
  })();

  // global - poziva ga onclick="copyRefLink(this)" u markup-u dugmeta
  function copyRefLink(btn) {
    var label = btn.querySelector('.tk-cta-label');
    if (!LINK_READY) {
      if (label) { var o = label.textContent; label.textContent = 'Sa\u010dekaj sekund\u2026'; setTimeout(function () { label.textContent = o; }, 1200); }
      return;
    }
    var done = function () {
      if (!label) return;
      var orig = label.textContent;
      label.textContent = 'Link kopiran \u2713';
      setTimeout(function () { label.textContent = orig; }, 2000);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(REFERRAL_LINK).then(done).catch(function () { fallbackCopy(REFERRAL_LINK); done(); });
    } else { fallbackCopy(REFERRAL_LINK); done(); }
  }
  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }
</script>
